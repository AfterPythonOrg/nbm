name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.plat }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - plat: darwin-arm64
            runner: macos-14
          - plat: darwin-x64
            runner: macos-13
          - plat: linux-x64
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Building version: $v"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build binary
        run: deno run -A scripts/build-binary.ts ${{ matrix.plat }} --version ${{ steps.version.outputs.version }}

      - name: Smoke test --version
        shell: bash
        run: |
          out="$(./dist/${{ matrix.plat }}/bin/nbm --version || true)"
          echo "Version output: $out"
          echo "$out" | grep -q "${{ steps.version.outputs.version }}" || {
            echo "Version smoke test failed"; exit 1;
          }
        if: matrix.plat == 'darwin-arm64' || matrix.plat == 'darwin-x64' || matrix.plat == 'linux-x64'

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nbm-${{ matrix.plat }}
          path: dist/${{ matrix.plat }}/bin/nbm
          retention-days: 7

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Resolve version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage platform packages
        shell: bash
        run: |
          set -euo pipefail
          for plat in darwin-arm64 darwin-x64 linux-x64; do
            mkdir -p npm/cli-$plat/bin
            cp artifacts/nbm-$plat/nbm npm/cli-$plat/bin/nbm
            chmod +x npm/cli-$plat/bin/nbm
            ls -la npm/cli-$plat/bin/
          done

      - name: Publish platform packages
        shell: bash
        run: |
          set -euo pipefail
          for plat in darwin-arm64 darwin-x64 linux-x64; do
            (cd npm/cli-$plat && npm publish --access public --provenance)
          done

      - name: Publish nbm launcher
        shell: bash
        run: |
          set -euo pipefail
          # Copy README and LICENSE in so the published tarball ships them.
          cp README.md npm/nbm/README.md
          cp LICENSE npm/nbm/LICENSE
          (cd npm/nbm && npm publish --access public --provenance)
